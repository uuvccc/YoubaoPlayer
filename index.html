<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>攸宝相册播放器</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; }
body { background:#000; color:#fff; font-family:'Microsoft YaHei',sans-serif; }
#player { width:100vw; height:100vh; height:100dvh; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
video { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; }
img { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; transform-origin:center center; }

/* Ken Burns 动画 */
@keyframes kenburns1 {
  0%   { transform: scale(1) translate(0,0); }
  100% { transform: scale(1.25) translate(-2%, -2%); }
}
@keyframes kenburns2 {
  0%   { transform: scale(1.15) translate(2%, 0); }
  100% { transform: scale(1) translate(-2%, 2%); }
}
@keyframes kenburns3 {
  0%   { transform: scale(1) translate(0, 2%); }
  100% { transform: scale(1.3) translate(0, -2%); }
}
@keyframes kenburns4 {
  0%   { transform: scale(1.2) translate(-2%, 1%); }
  100% { transform: scale(1) translate(2%, -1%); }
}
img.kenburns { will-change: transform, opacity; animation-timing-function: ease-out; animation-fill-mode: forwards; }

#overlay { position:absolute; top:12px; left:12px; z-index:10; background:rgba(0,0,0,0.55); padding:10px 16px; border-radius:10px; font-size:13px; pointer-events:none; opacity:0.85; }
#overlay h1 { font-size:18px; margin-bottom:3px; }
#preloadInfo { font-size:11px; margin-top:4px; opacity:0.7; min-height:16px; }
#controls { position:absolute; bottom:max(12px, env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%); z-index:10; display:flex; flex-wrap:wrap; justify-content:center; gap:8px; background:rgba(0,0,0,0.55); padding:8px 14px; border-radius:24px; max-width:96vw; }
#controls button { background:rgba(255,255,255,0.15); border:none; color:#fff; padding:10px 16px; border-radius:18px; cursor:pointer; font-size:15px; font-family:inherit; transition:background .2s; touch-action:manipulation; min-height:44px; min-width:44px; }
#controls button:hover, #controls button:active { background:rgba(255,255,255,0.35); }
#controls button.active { background:rgba(100,180,255,0.5); }
#progress { position:absolute; bottom:max(68px, calc(env(safe-area-inset-bottom) + 56px)); left:50%; transform:translateX(-50%); z-index:10; background:rgba(0,0,0,0.4); padding:5px 14px; border-radius:16px; font-size:12px; white-space:nowrap; }
#timerBar { position:absolute; bottom:max(90px, calc(env(safe-area-inset-bottom) + 78px)); left:50%; transform:translateX(-50%); z-index:10; width:200px; height:4px; background:rgba(255,255,255,0.2); border-radius:2px; overflow:hidden; }
#timerBar .fill { display:block; height:100%; width:0%; background:linear-gradient(90deg,#66b3ff,#a0d8ff); border-radius:2px; }
#timerBar .fill.running { transition:width linear; }
.hidden { display:none !important; }
#fadeLayer { position:absolute; inset:0; background:#000; z-index:5; pointer-events:none; transition:opacity 0.3s ease-in-out; opacity:0; }

@media (max-width: 480px) {
  #overlay { top:8px; left:8px; padding:8px 12px; border-radius:8px; font-size:12px; }
  #overlay h1 { font-size:15px; }
  #controls { gap:6px; padding:6px 10px; border-radius:20px; }
  #controls button { padding:8px 12px; font-size:13px; min-height:40px; min-width:40px; border-radius:14px; }
  #progress { bottom:max(58px, calc(env(safe-area-inset-bottom) + 46px)); padding:4px 10px; font-size:11px; }
  #timerBar { bottom:max(78px, calc(env(safe-area-inset-bottom) + 66px)); width:140px; }
}

@media (min-width: 481px) and (max-width: 768px) {
  #overlay { top:10px; left:10px; padding:10px 14px; }
  #overlay h1 { font-size:17px; }
  #controls button { padding:9px 14px; font-size:14px; }
}
</style>
</head>
<body>
<div id="player">
  <div id="fadeLayer"></div>
  <div id="overlay">
    <h1>👶 攸宝相册</h1>
    <div id="info">加载中...</div>
    <div id="preloadInfo"></div>
  </div>
  <div id="timerBar"><span class="fill" id="timerFill"></span></div>
  <div id="progress"></div>
  <div id="controls">
    <button id="btnPrev" title="上一个">⏮</button>
    <button id="btnPause" title="暂停/继续">⏸</button>
    <button id="btnNext" title="下一个">⏭</button>
    <button id="btnMode" title="切换模式">🎬 全部</button>
    <button id="btnSpeed" title="图片停留时间">5秒</button>
    <button id="btnShuffle" title="随机顺序">🔀 随机</button>
    <button id="btnRefresh" title="换一批">🔄 换一批</button>
    <button id="btnMute" title="静音/取消静音">🔊</button>
    <button id="btnHide" title="隐藏控制栏">👁</button>
  </div>
</div>

<script>
/**
 * YoubaoPlayer - 重构版本
 * 核心模块：ImageLoader, CacheManager, PlayerController
 */

const DEBUG = false;
function log(...args) { if (DEBUG || window.location.hash === '#debug') console.log('[Youbao]', ...args); }

// ==================== 配置常量 ====================
const CONFIG = {
  VIDEO_CLIP_DURATION: 30,
  BATCH_SIZE: 50,
  KENBURNS_ANIMS: ['kenburns1', 'kenburns2', 'kenburns3', 'kenburns4'],
  MAX_CACHE_SIZE: window.innerWidth < 768 ? 15 : 30,
  MAX_RETRY_COUNT: 2,
  MAX_WAIT_TIME: 15000,
  PRELOAD_DELAY: 500,
  PROGRESS_UPDATE_INTERVAL: 3000
};

// ==================== 缓存管理器 ====================
class CacheManager {
  constructor() {
    this.highQualityCache = new Map();
    this.lowQualityCache = new Map();
  }

  add(path, highQualityImg, lowQualityImg) {
    // LRU淘汰
    if (this.highQualityCache.size >= CONFIG.MAX_CACHE_SIZE) {
      const oldest = this.highQualityCache.keys().next().value;
      this.remove(oldest);
    }

    this.highQualityCache.set(path, highQualityImg);
    if (lowQualityImg) {
      this.lowQualityCache.set(path, lowQualityImg);
    }
    log(`Cache added: ${path} (size: ${this.highQualityCache.size})`);
  }

  getHighQuality(path) {
    return this.highQualityCache.get(path);
  }

  getLowQuality(path) {
    return this.lowQualityCache.get(path);
  }

  has(path) {
    return this.highQualityCache.has(path);
  }

  remove(path) {
    this.highQualityCache.delete(path);
    this.lowQualityCache.delete(path);
  }

  getRandom() {
    if (this.highQualityCache.size === 0) return null;
    const keys = Array.from(this.highQualityCache.keys());
    const randomKey = keys[Math.floor(Math.random() * keys.length)];
    const img = this.highQualityCache.get(randomKey);
    this.remove(randomKey);
    return { img, path: randomKey };
  }

  clear() {
    this.highQualityCache.clear();
    this.lowQualityCache.clear();
  }
}

// ==================== 图片加载器 ====================
class ImageLoader {
  constructor(onProgress, onComplete, onError) {
    this.onProgress = onProgress;
    this.onComplete = onComplete;
    this.onError = onError;
    this.currentRequest = null;
  }

  load(src, retryCount = 0) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      
      // 进度跟踪
      img.onprogress = (e) => {
        if (this.onProgress) {
          if (e.lengthComputable) {
            const percent = Math.round((e.loaded / e.total) * 100);
            this.onProgress(src, percent);
          } else {
            const kb = Math.round(e.loaded / 1024);
            this.onProgress(src, null, kb);
          }
        }
      };

      // 加载成功
      img.onload = () => {
        log(`Image loaded: ${src}`);
        if (this.onComplete) {
          this.onComplete(src, img);
        }
        resolve(img);
      };

      // 加载失败 - 重试机制
      img.onerror = () => {
        if (retryCount < CONFIG.MAX_RETRY_COUNT) {
          log(`Retry ${retryCount + 1}/${CONFIG.MAX_RETRY_COUNT}: ${src}`);
          setTimeout(() => {
            this.load(src, retryCount + 1).then(resolve).catch(reject);
          }, 1000 * Math.pow(2, retryCount));
        } else {
          log(`Load failed: ${src}`);
          if (this.onError) {
            this.onError(src);
          }
          reject(new Error('Load failed'));
        }
      };

      img.src = src;
      this.currentRequest = img;
    });
  }

  cancel() {
    if (this.currentRequest) {
      this.currentRequest.onload = null;
      this.currentRequest.onerror = null;
      this.currentRequest.onprogress = null;
      this.currentRequest.src = '';
      this.currentRequest = null;
    }
  }

  createLowQuality(src) {
    const img = new Image();
    img.src = src;
    img.style.filter = 'blur(10px)';
    img.style.transform = 'scale(1.1)';
    return img;
  }
}

// ==================== 播放器控制器 ====================
class PlayerController {
  constructor() {
    this.playlist = [];
    this.currentIndex = 0;
    this.paused = false;
    this.mode = 'all';
    this.shuffled = true;
    this.imgInterval = 5000;
    this.controlsVisible = true;
    this.muted = false;
    
    this.cache = new CacheManager();
    this.imageLoader = new ImageLoader(
      this.handleProgress.bind(this),
      this.handleLoadComplete.bind(this),
      this.handleLoadError.bind(this)
    );
    
    this.state = {
      isTransitioning: false,
      imageLoaded: false,
      waitTime: 0,
      preloadTimer: null,
      switchTimer: null,
      progressTimer: null,
      currentElement: null
    };

    this.initElements();
    this.initEvents();
  }

  initElements() {
    this.elements = {
      player: document.getElementById('player'),
      fadeLayer: document.getElementById('fadeLayer'),
      info: document.getElementById('info'),
      preloadInfo: document.getElementById('preloadInfo'),
      progress: document.getElementById('progress'),
      timerFill: document.getElementById('timerFill'),
      btnPrev: document.getElementById('btnPrev'),
      btnPause: document.getElementById('btnPause'),
      btnNext: document.getElementById('btnNext'),
      btnMode: document.getElementById('btnMode'),
      btnSpeed: document.getElementById('btnSpeed'),
      btnShuffle: document.getElementById('btnShuffle'),
      btnRefresh: document.getElementById('btnRefresh'),
      btnMute: document.getElementById('btnMute'),
      btnHide: document.getElementById('btnHide')
    };
  }

  initEvents() {
    // 按钮事件
    this.elements.btnPrev.onclick = () => this.previous();
    this.elements.btnNext.onclick = () => this.next();
    this.elements.btnPause.onclick = () => this.togglePause();
    this.elements.btnMode.onclick = () => this.toggleMode();
    this.elements.btnSpeed.onclick = () => this.toggleSpeed();
    this.elements.btnShuffle.onclick = () => this.toggleShuffle();
    this.elements.btnRefresh.onclick = () => this.refresh();
    this.elements.btnMute.onclick = () => this.toggleMute();
    this.elements.btnHide.onclick = () => this.toggleControls();

    // 触摸事件
    this.initTouchEvents();
    
    // 键盘事件
    this.initKeyboardEvents();
    
    // 页面可见性
    document.addEventListener('visibilitychange', () => this.handleVisibilityChange());
  }

  initTouchEvents() {
    let startX, startY, startTime;
    
    this.elements.player.addEventListener('touchstart', e => {
      startX = e.changedTouches[0].screenX;
      startY = e.changedTouches[0].screenY;
      startTime = Date.now();
    }, { passive: true });

    this.elements.player.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].screenX - startX;
      const dy = e.changedTouches[0].screenY - startY;
      const dt = Date.now() - startTime;

      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50 && dt < 500) {
        dx < 0 ? this.next() : this.previous();
      } else if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 80 && dt < 500) {
        this.toggleControls();
      }
    }, { passive: true });

    this.elements.player.addEventListener('dblclick', () => this.togglePause());
  }

  initKeyboardEvents() {
    document.addEventListener('keydown', e => {
      switch(e.key) {
        case 'ArrowRight':
        case ' ':
          e.preventDefault();
          this.next();
          break;
        case 'ArrowLeft':
          this.previous();
          break;
        case 'p':
        case 'P':
          this.togglePause();
          break;
        case 'h':
        case 'H':
          this.toggleControls();
          break;
        case 'r':
        case 'R':
          this.refresh();
          break;
      }
    });
  }

  // ==================== 核心播放逻辑 ====================
  
  async showItem(index) {
    if (index < 0 || index >= this.playlist.length) return;
    if (this.state.isTransitioning) {
      log('Skip: already transitioning');
      return;
    }

    this.state.isTransitioning = true;
    this.currentIndex = index;
    const item = this.playlist[index];
    
    log(`Show item: ${index} (${item.type})`);
    
    // 清理旧状态
    this.cleanup();
    
    // 淡入黑场
    this.elements.fadeLayer.style.opacity = '1';
    
    setTimeout(() => {
      // 移除旧元素
      if (this.state.currentElement) {
        this.state.currentElement.remove();
        this.state.currentElement = null;
      }
      
      if (item.type === 'image') {
        this.showImage(item);
      } else {
        this.showVideo(item);
      }
      
      // 淡出黑场
      this.elements.fadeLayer.style.opacity = '0';
      
      // 启动进度跟踪和计时器（在 showImage/showVideo 内部调用）
    }, 300);
  }

  showImage(item) {
    const animName = CONFIG.KENBURNS_ANIMS[Math.floor(Math.random() * CONFIG.KENBURNS_ANIMS.length)];
    const durationSec = Math.max(this.imgInterval / 1000, 3);
    
    // 检查缓存
    const cachedImg = this.cache.getHighQuality(item.path);
    const lowQualityImg = this.cache.getLowQuality(item.path);
    
    let img;
    
    if (cachedImg) {
      // 使用缓存的高清图
      log('Using cached image');
      img = cachedImg.cloneNode(true);
      this.displayImage(img, item, animName, durationSec);
      this.state.imageLoaded = true; // 必须在 displayImage 之后设置
    } else if (lowQualityImg) {
      // 先显示低质量图，再加载高清图
      log('Using low quality placeholder');
      img = lowQualityImg.cloneNode();
      img.style.opacity = '1';
      this.displayImage(img, item, animName, durationSec, true);
      this.state.imageLoaded = true; // 低质量图也算加载完成
      
      // 后台加载高清图
      this.imageLoader.load(item.path)
        .then(hqImg => {
          this.cache.add(item.path, hqImg, null);
          // 平滑过渡到高清图
          img.style.filter = 'none';
          img.style.transform = 'scale(1)';
          img.style.transition = 'filter 0.3s ease-out, transform 0.3s ease-out';
        })
        .catch(err => {
          log('HQ load failed:', err);
        });
    } else {
      // 创建新图片，先显示模糊占位
      img = document.createElement('img');
      img.alt = item.name;
      img.className = 'kenburns';
      img.style.opacity = '1';
      img.style.filter = 'blur(10px)';
      img.style.transform = 'scale(1.1)';
      img.style.animation = `${animName} ${durationSec}s ease-out forwards`;
      
      this.elements.player.insertBefore(img, this.elements.fadeLayer);
      this.state.currentElement = img;
      this.state.imageLoaded = false; // 新图片需要等待加载
      
      // 加载高清图
      this.imageLoader.load(item.path)
        .then(hqImg => {
          this.createLowQualityAndCache(item.path, hqImg);
          // 替换为高清图
          img.parentNode.replaceChild(hqImg, img);
          hqImg.className = 'kenburns';
          hqImg.style.opacity = '1';
          hqImg.style.filter = 'none';
          hqImg.style.transform = 'scale(1)';
          hqImg.style.animation = `${animName} ${durationSec}s ease-out forwards`;
          this.state.currentElement = hqImg;
          this.state.imageLoaded = true;
        })
        .catch(err => {
          log('Image load failed:', err);
          img.style.filter = 'none';
          img.style.transform = 'scale(1)';
          this.state.imageLoaded = true; // 失败也标记为完成，避免卡住
        });
    }
    
    this.updateInfo(item);
    this.state.startTime = Date.now();
    
    // 先启动进度跟踪（会清除旧计时器）
    this.startProgressTracker();
    
    // 再设置切换计时器（必须在 startProgressTracker 之后）
    if (!this.paused) {
      this.scheduleNext();
    }
    
    // 预加载下一张
    if (!this.paused) {
      setTimeout(() => this.preloadNext(), CONFIG.PRELOAD_DELAY);
    }
  }

  displayImage(img, item, animName, durationSec, isLowQuality = false) {
    img.alt = item.name;
    img.className = 'kenburns';
    img.style.animation = `${animName} ${durationSec}s ease-out forwards`;
    
    if (!isLowQuality) {
      // 高清图需要淡入效果
      img.style.opacity = '0';
      setTimeout(() => {
        img.style.opacity = '1';
        img.style.transition = 'opacity 0.4s';
      }, 100);
    }
    // 低质量图已经设置为 opacity: 1，不需要再处理
    
    this.elements.player.insertBefore(img, this.elements.fadeLayer);
    this.state.currentElement = img;
  }

  showVideo(item) {
    const vid = document.createElement('video');
    vid.src = item.path;
    vid.autoplay = true;
    vid.playsInline = true;
    vid.muted = this.muted;
    vid.style.opacity = '0';
    
    vid.oncanplay = () => {
      vid.style.transition = 'opacity 0.4s';
      vid.style.opacity = '1';
      
      const duration = vid.duration;
      if (duration > 10) {
        const maxStart = Math.max(0, duration - CONFIG.VIDEO_CLIP_DURATION);
        const randomStart = Math.random() * maxStart;
        vid.currentTime = randomStart;
        
        const clipEnd = randomStart + CONFIG.VIDEO_CLIP_DURATION;
        vid.dataset.clipEnd = clipEnd;
        
        setTimeout(() => {
          if (!this.paused) this.next();
        }, CONFIG.VIDEO_CLIP_DURATION * 1000);
      }
    };
    
    vid.onended = () => {
      if (!this.paused) this.next();
    };
    
    vid.onerror = () => {
      if (!this.paused) this.next();
    };
    
    this.elements.player.insertBefore(vid, this.elements.fadeLayer);
    this.state.currentElement = vid;
    this.updateInfo(item);
  }

  // ==================== 预加载系统 ====================
  
  preloadNext() {
    const nextIndex = this.getNextIndex();
    const nextItem = this.playlist[nextIndex];
    
    if (!nextItem || nextItem.type !== 'image') return;
    if (this.cache.has(nextItem.path)) return;
    
    log(`Preloading: ${nextItem.path}`);
    
    this.imageLoader.load(nextItem.path)
      .then(hqImg => {
        const lqImg = this.imageLoader.createLowQuality(nextItem.path);
        this.cache.add(nextItem.path, hqImg, lqImg);
        this.hidePreloadInfo();
      })
      .catch(() => {
        this.hidePreloadInfo();
      });
  }

  createLowQualityAndCache(path, hqImg) {
    const lqImg = this.imageLoader.createLowQuality(path);
    this.cache.add(path, hqImg, lqImg);
  }

  // ==================== 进度显示 ====================
  
  handleProgress(src, percent, kb) {
    const itemName = this.playlist.find(i => i.path === src)?.name || '未知';
    if (percent !== null) {
      this.elements.preloadInfo.textContent = `⏳ 预加载中: ${itemName} ${percent}%`;
    } else if (kb) {
      this.elements.preloadInfo.textContent = `⏳ 预加载中: ${itemName} ${kb}KB...`;
    }
  }

  handleLoadComplete(src, img) {
    const itemName = this.playlist.find(i => i.path === src)?.name || '未知';
    this.elements.preloadInfo.textContent = `✅ 预加载完成: ${itemName}`;
    this.elements.preloadInfo.style.color = '#4ade80';
    
    setTimeout(() => this.hidePreloadInfo(), CONFIG.PROGRESS_UPDATE_INTERVAL);
  }

  handleLoadError(src) {
    this.hidePreloadInfo();
  }

  hidePreloadInfo() {
    this.elements.preloadInfo.textContent = '';
    this.elements.preloadInfo.style.color = '';
  }

  // ==================== 计时器管理 ====================
  
  scheduleNext() {
    this.clearTimers();
    
    const checkAndSchedule = () => {
      if (this.state.imageLoaded || this.paused) {
        this.state.waitTime = 0;
        this.state.switchTimer = setTimeout(() => {
          if (!this.paused) this.next();
        }, this.imgInterval);
      } else {
        this.state.waitTime += 1000;
        
        if (this.state.waitTime >= CONFIG.MAX_WAIT_TIME) {
          // 超时，尝试使用缓存
          const cached = this.cache.getRandom();
          if (cached) {
            log('Timeout: using cached image');
            this.state.imageLoaded = true;
            this.showItem(this.playlist.findIndex(i => i.path === cached.path));
          } else {
            log('Timeout: no cache, force complete');
            this.state.imageLoaded = true;
            checkAndSchedule();
          }
        } else {
          log(`Waiting for image... (${this.state.waitTime/1000}s)`);
          this.state.switchTimer = setTimeout(checkAndSchedule, 1000);
        }
      }
    };
    
    checkAndSchedule();
  }

  startProgressTracker() {
    this.clearTimers();
    this.state.progressTimer = setInterval(() => {
      if (!this.paused && this.state.currentElement?.tagName === 'IMG') {
        this.updatePhotoProgress();
      }
    }, 500);
  }

  clearTimers() {
    if (this.state.switchTimer) {
      clearTimeout(this.state.switchTimer);
      this.state.switchTimer = null;
    }
    if (this.state.progressTimer) {
      clearInterval(this.state.progressTimer);
      this.state.progressTimer = null;
    }
  }

  cleanup() {
    this.clearTimers();
    this.imageLoader.cancel();
    this.state.imageLoaded = false;
    this.state.waitTime = 0;
    this.hidePreloadInfo();
  }

  // ==================== UI更新 ====================
  
  updateInfo(item) {
    const modeLabel = this.mode === 'all' ? '全部' : this.mode === 'photo' ? '照片' : '视频';
    this.elements.info.textContent = `${item.name} (${this.currentIndex + 1}/${this.playlist.length})`;
  }

  updatePhotoProgress() {
    const elapsed = Math.floor((Date.now() - this.state.startTime) / 1000);
    const total = Math.floor(this.imgInterval / 1000);
    this.elements.progress.textContent = `📷 ${total}s · 本批 ${this.playlist.length} 张`;
  }

  resetTimerBar(durationMs) {
    this.elements.timerFill.classList.remove('running');
    this.elements.timerFill.style.transition = 'none';
    this.elements.timerFill.style.width = '0%';
    void this.elements.timerFill.offsetWidth;
    
    if (!this.paused && durationMs > 0) {
      this.elements.timerFill.style.transition = `width ${durationMs}ms linear`;
      this.elements.timerFill.style.width = '100%';
    }
  }

  // ==================== 用户操作 ====================
  
  next() {
    this.clearTimers();
    this.showItem(this.getNextIndex());
  }

  previous() {
    this.clearTimers();
    this.showItem(this.getPreviousIndex());
  }

  getNextIndex() {
    if (this.shuffled) {
      return Math.floor(Math.random() * this.playlist.length);
    }
    return (this.currentIndex + 1) % this.playlist.length;
  }

  getPreviousIndex() {
    if (this.shuffled) {
      return Math.floor(Math.random() * this.playlist.length);
    }
    return (this.currentIndex - 1 + this.playlist.length) % this.playlist.length;
  }

  togglePause() {
    this.paused = !this.paused;
    this.elements.btnPause.textContent = this.paused ? '▶' : '⏸';
    
    if (!this.paused) {
      this.state.startTime = Date.now();
      this.scheduleNext();
      this.startProgressTracker();
      if (this.state.currentElement?.tagName === 'VIDEO') {
        this.state.currentElement.play();
      }
    } else {
      this.clearTimers();
      if (this.state.currentElement?.tagName === 'VIDEO') {
        this.state.currentElement.pause();
      }
    }
  }

  toggleMode() {
    const modes = ['all', 'photo', 'video'];
    const labels = ['🎬 全部', '📷 照片', '🎥 视频'];
    const currentIndex = modes.indexOf(this.mode);
    this.mode = modes[(currentIndex + 1) % modes.length];
    this.elements.btnMode.textContent = labels[(currentIndex + 1) % modes.length];
    this.buildPlaylist();
  }

  toggleSpeed() {
    const speeds = [3000, 5000, 8000, 12000];
    const labels = ['3秒', '5秒', '8秒', '12秒'];
    const currentIndex = speeds.indexOf(this.imgInterval);
    this.imgInterval = speeds[(currentIndex + 1) % speeds.length];
    this.elements.btnSpeed.textContent = labels[(currentIndex + 1) % speeds.length];
  }

  toggleShuffle() {
    this.shuffled = !this.shuffled;
    this.elements.btnShuffle.textContent = this.shuffled ? '🔀 随机' : '🔀 顺序';
  }

  refresh() {
    this.buildPlaylist();
  }

  toggleMute() {
    this.muted = !this.muted;
    this.elements.btnMute.textContent = this.muted ? '🔇' : '🔊';
    if (this.state.currentElement?.tagName === 'VIDEO') {
      this.state.currentElement.muted = this.muted;
    }
  }

  toggleControls() {
    this.controlsVisible = !this.controlsVisible;
    this.elements.btnHide.parentElement.classList.toggle('hidden', !this.controlsVisible);
    document.getElementById('progress').classList.toggle('hidden', !this.controlsVisible);
    document.getElementById('overlay').classList.toggle('hidden', !this.controlsVisible);
    document.getElementById('timerBar').classList.toggle('hidden', !this.controlsVisible);
  }

  handleVisibilityChange() {
    if (document.hidden && !this.paused) {
      this.clearTimers();
      if (this.state.currentElement?.tagName === 'VIDEO') {
        this.state.currentElement.pause();
      }
    } else if (!document.hidden && !this.paused) {
      this.state.startTime = Date.now();
      this.scheduleNext();
      this.startProgressTracker();
      if (this.state.currentElement?.tagName === 'VIDEO') {
        this.state.currentElement.play().catch(() => {});
      }
    }
  }

  // ==================== 播放列表管理 ====================
  
  async loadManifest() {
    try {
      const resp = await fetch('manifest.json');
      const data = await resp.json();
      this.allMedia = data;
      this.buildPlaylist();
    } catch(e) {
      this.elements.info.textContent = '加载失败: ' + e.message;
    }
  }

  buildPlaylist() {
    let items = this.allMedia || [];
    
    if (this.mode === 'photo') {
      items = items.filter(i => i.type === 'image');
    } else if (this.mode === 'video') {
      items = items.filter(i => i.type === 'video');
    }

    // 随机抽取
    if (items.length > CONFIG.BATCH_SIZE) {
      items = this.shuffleArray(items).slice(0, CONFIG.BATCH_SIZE);
    }
    
    items = this.shuffleArray(items);
    
    this.playlist = items;
    this.currentIndex = 0;
    this.cache.clear();
    
    if (this.playlist.length > 0) {
      this.showItem(0);
    } else {
      this.elements.info.textContent = '没有找到媒体文件';
    }
  }

  shuffleArray(array) {
    const shuffled = [...array];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled;
  }
}

// ==================== 初始化 ====================
const player = new PlayerController();
player.loadManifest();
</script>
