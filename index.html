<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>攸宝相册播放器</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; }
body { background:#000; color:#fff; font-family:'Microsoft YaHei',sans-serif; }
#player { width:100vw; height:100vh; height:100dvh; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
video { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; }
img { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; transform-origin:center center; }

/* Ken Burns 动画 —— 慢速缩放和平移 */
@keyframes kenburns1 {
  0%   { transform: scale(1) translate(0,0); }
  100% { transform: scale(1.25) translate(-2%, -2%); }
}
@keyframes kenburns2 {
  0%   { transform: scale(1.15) translate(2%, 0); }
  100% { transform: scale(1) translate(-2%, 2%); }
}
@keyframes kenburns3 {
  0%   { transform: scale(1) translate(0, 2%); }
  100% { transform: scale(1.3) translate(0, -2%); }
}
@keyframes kenburns4 {
  0%   { transform: scale(1.2) translate(-2%, 1%); }
  100% { transform: scale(1) translate(2%, -1%); }
}
img.kenburns { will-change: transform, opacity; animation-timing-function: ease-out; animation-fill-mode: forwards; }

#overlay { position:absolute; top:12px; left:12px; z-index:10; background:rgba(0,0,0,0.55); padding:10px 16px; border-radius:10px; font-size:13px; pointer-events:none; opacity:0.85; }
#overlay h1 { font-size:18px; margin-bottom:3px; }
#controls { position:absolute; bottom:max(12px, env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%); z-index:10; display:flex; flex-wrap:wrap; justify-content:center; gap:8px; background:rgba(0,0,0,0.55); padding:8px 14px; border-radius:24px; max-width:96vw; }
#controls button { background:rgba(255,255,255,0.15); border:none; color:#fff; padding:10px 16px; border-radius:18px; cursor:pointer; font-size:15px; font-family:inherit; transition:background .2s; touch-action:manipulation; min-height:44px; min-width:44px; }
#controls button:hover, #controls button:active { background:rgba(255,255,255,0.35); }
#controls button.active { background:rgba(100,180,255,0.5); }
#progress { position:absolute; bottom:max(68px, calc(env(safe-area-inset-bottom) + 56px)); left:50%; transform:translateX(-50%); z-index:10; background:rgba(0,0,0,0.4); padding:5px 14px; border-radius:16px; font-size:12px; white-space:nowrap; }
#timerBar { position:absolute; bottom:max(90px, calc(env(safe-area-inset-bottom) + 78px)); left:50%; transform:translateX(-50%); z-index:10; width:200px; height:4px; background:rgba(255,255,255,0.2); border-radius:2px; overflow:hidden; }
#timerBar .fill { display:block; height:100%; width:0%; background:linear-gradient(90deg,#66b3ff,#a0d8ff); border-radius:2px; }
#timerBar .fill.running { transition:width linear; }
.hidden { display:none !important; }
#fadeLayer { position:absolute; inset:0; background:#000; z-index:5; pointer-events:none; transition:opacity 0.3s ease-in-out; opacity:0; }

@media (max-width: 480px) {
  #overlay { top:8px; left:8px; padding:8px 12px; border-radius:8px; font-size:12px; }
  #overlay h1 { font-size:15px; }
  #controls { gap:6px; padding:6px 10px; border-radius:20px; }
  #controls button { padding:8px 12px; font-size:13px; min-height:40px; min-width:40px; border-radius:14px; }
  #progress { bottom:max(58px, calc(env(safe-area-inset-bottom) + 46px)); padding:4px 10px; font-size:11px; }
  #timerBar { bottom:max(78px, calc(env(safe-area-inset-bottom) + 66px)); width:140px; }
}

@media (min-width: 481px) and (max-width: 768px) {
  #overlay { top:10px; left:10px; padding:10px 14px; }
  #overlay h1 { font-size:17px; }
  #controls button { padding:9px 14px; font-size:14px; }
}
</style>
</head>
<body>
<div id="player">
  <div id="fadeLayer"></div>
  <div id="overlay">
    <h1>👶 攸宝相册</h1>
    <div id="info">加载中...</div>
  </div>
  <div id="timerBar"><span class="fill" id="timerFill"></span></div>
  <div id="progress"></div>
  <div id="controls">
    <button id="btnPrev" title="上一个">⏮</button>
    <button id="btnPause" title="暂停/继续">⏸</button>
    <button id="btnNext" title="下一个">⏭</button>
    <button id="btnMode" title="切换模式">🎬 全部</button>
    <button id="btnSpeed" title="图片停留时间">5秒</button>
    <button id="btnShuffle" title="随机顺序">🔀 随机</button>
    <button id="btnRefresh" title="换一批">🔄 换一批</button>
    <button id="btnMute" title="静音/取消静音">🔊</button>
    <button id="btnHide" title="隐藏控制栏">👁</button>
  </div>
</div>

<script>
const DEBUG = false;
function log(...args) { if (DEBUG || window.location.hash === '#debug') console.log('[Youbao]', ...args); }

const VIDEO_CLIP_DURATION = 30;
const BATCH_SIZE = 50;
const KENBURNS_ANIMS = ['kenburns1', 'kenburns2', 'kenburns3', 'kenburns4'];

let playlist = [];
let currentIdx = 0;
let paused = false;
let imgTimer = null;
let imgInterval = 5000;
let mode = 'all';
let shuffled = true;
let controlsVisible = true;
let muted = false;
let allMedia = [];
let _autoStartTimer = null;

const player = document.getElementById('player');
const fadeLayer = document.getElementById('fadeLayer');
const info = document.getElementById('info');
const progress = document.getElementById('progress');
const timerFill = document.getElementById('timerFill');
const btnMode = document.getElementById('btnMode');
const btnSpeed = document.getElementById('btnSpeed');
const btnShuffle = document.getElementById('btnShuffle');
const btnRefresh = document.getElementById('btnRefresh');

let currentEl = null;
let _clipEndHandler = null;
let _clipInterval = null;
let _currentDuration = 0;
let _currentStartTime = 0;
let _isTransitioning = false; // 防止快速切换
let _preloadImg = null; // 预加载的图片元素
let _cachedImages = new Map(); // 缓存已加载的图片 {path: img}
let _lowQualityCache = new Map(); // 低质量占位图缓存
const MAX_CACHE_SIZE = window.innerWidth < 768 ? 15 : 30; // 根据屏幕大小动态调整
const MAX_RETRY_COUNT = 2; // 最大重试次数

// 预加载下一张图片
function preloadNextImage() {
  if (_preloadImg) {
    _preloadImg.onload = null;
    _preloadImg.onerror = null;
  }
  
  const nextIndex = nextIdx();
  const nextItem = playlist[nextIndex];
  
  if (nextItem && nextItem.type === 'image') {
    // 检查是否已缓存
    if (_cachedImages.has(nextItem.path)) {
      log('next image already cached');
      return;
    }
    
    _preloadImg = new Image();
    _preloadImg.src = nextItem.path;
    
    // 加载完成后加入缓存
    _preloadImg.onload = () => {
      log('preload complete, caching:', nextItem.path);
      
      // 创建低质量占位图（缩小版本）
      const lowQualityImg = new Image();
      lowQualityImg.src = nextItem.path;
      lowQualityImg.style.filter = 'blur(10px)';
      lowQualityImg.style.transform = 'scale(1.1)';
      _lowQualityCache.set(nextItem.path, lowQualityImg);
      
      _cachedImages.set(nextItem.path, _preloadImg);
      _preloadImg = null;
      
      // 限制缓存大小
      if (_cachedImages.size > MAX_CACHE_SIZE) {
        const firstKey = _cachedImages.keys().next().value;
        _cachedImages.delete(firstKey);
        _lowQualityCache.delete(firstKey);
        log('cache full, removed oldest');
      }
    };
    
    _preloadImg.onerror = () => {
      log('preload failed:', nextItem.path);
      _preloadImg = null;
    };
    
    log('preloading next image:', nextItem.path);
  }
}

// 获取一张已缓存的随机图片
function getCachedRandomImage() {
  if (_cachedImages.size === 0) return null;
  
  const keys = Array.from(_cachedImages.keys());
  const randomKey = keys[Math.floor(Math.random() * keys.length)];
  const img = _cachedImages.get(randomKey);
  
  // 从缓存中移除（避免重复使用）
  _cachedImages.delete(randomKey);
  _lowQualityCache.delete(randomKey);
  log('using cached random image:', randomKey);
  
  return { img, path: randomKey };
}

// 带重试机制的图片加载
function loadImageWithRetry(imgElement, src, retryCount = 0) {
  return new Promise((resolve, reject) => {
    imgElement.onload = () => {
      log('image loaded successfully:', src);
      resolve(imgElement);
    };
    
    imgElement.onerror = () => {
      if (retryCount < MAX_RETRY_COUNT) {
        log(`load failed, retrying (${retryCount + 1}/${MAX_RETRY_COUNT})`);
        // 指数退避重试
        setTimeout(() => {
          loadImageWithRetry(imgElement, src, retryCount + 1)
            .then(resolve)
            .catch(reject);
        }, 1000 * Math.pow(2, retryCount));
      } else {
        log('load failed after max retries:', src);
        reject(new Error('Load failed'));
      }
    };
    
    imgElement.src = src;
  });
}

// 使用缓存图片立即显示
function showItemWithCachedImage(cachedImg, path) {
  // 找到对应的 item
  const item = playlist.find(i => i.path === path);
  if (!item) {
    log('cached image not found in playlist');
    showItem(nextIdx());
    return;
  }
  
  // 直接显示缓存的图片
  const idx = playlist.indexOf(item);
  currentIdx = idx;
  
  if (currentEl) { currentEl.remove(); currentEl = null; }
  
  const animName = KENBURNS_ANIMS[Math.floor(Math.random() * KENBURNS_ANIMS.length)];
  const durationSec = Math.max(imgInterval / 1000, 3);
  
  cachedImg.alt = item.name;
  cachedImg.className = 'kenburns';
  cachedImg.style.opacity = '1';
  cachedImg.style.transition = 'opacity 0.4s';
  cachedImg.style.animation = `${animName} ${durationSec}s ease-out forwards`;
  
  player.insertBefore(cachedImg, fadeLayer);
  currentEl = cachedImg;
  
  _currentDuration = imgInterval;
  _currentStartTime = Date.now();
  resetTimerBar(imgInterval);
  _progressTick = setInterval(updatePhotoProgress, 500);
  
  info.textContent = `${item.name}  (${idx+1}/${playlist.length}) [缓存]`;
  
  // 淡出黑场
  fadeLayer.style.opacity = '0';
  
  // 释放锁
  setTimeout(() => {
    _isTransitioning = false;
  }, 300);
  
  // 启动下一次切换计时器
  if (!paused) _scheduleNext();
  
  // 预加载下一张
  setTimeout(() => preloadNextImage(), 500);
}

// 触摸滑动支持
let touchStartX = 0;
let touchStartY = 0;
let touchStartTime = 0;

player.addEventListener('touchstart', e => {
  touchStartX = e.changedTouches[0].screenX;
  touchStartY = e.changedTouches[0].screenY;
  touchStartTime = Date.now();
}, { passive: true });

player.addEventListener('touchend', e => {
  const touchEndX = e.changedTouches[0].screenX;
  const touchEndY = e.changedTouches[0].screenY;
  const dx = touchEndX - touchStartX;
  const dy = touchEndY - touchStartY;
  const dt = Date.now() - touchStartTime;

  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50 && dt < 500) {
    if (dx < 0) {
      clearTimeout(imgTimer);
      showItem(nextIdx());
    } else {
      clearTimeout(imgTimer);
      showItem(prevIdx());
    }
  } else if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 80 && dt < 500) {
    document.getElementById('btnHide').click();
  }
}, { passive: true });

// 双击暂停/继续
player.addEventListener('dblclick', () => {
  document.getElementById('btnPause').click();
});

function resetTimerBar(durationMs) {
  // 强制重置进度条
  timerFill.classList.remove('running');
  timerFill.style.transition = 'none';
  timerFill.style.width = '0%';
  // 强制重排后开始动画
  void timerFill.offsetWidth;
  if (!paused && durationMs > 0) {
    timerFill.style.transition = `width ${durationMs}ms linear`;
    timerFill.style.width = '100%';
  }
}

function updatePhotoProgress() {
  if (paused) return;
  const elapsed = Date.now() - _currentStartTime;
  const total = _currentDuration;
  const secs = Math.floor(elapsed / 1000);
  const totalSecs = Math.floor(total / 1000);
  const modeLabel = mode === 'all' ? '全部' : mode === 'photo' ? '照片' : '视频';
  progress.textContent = `📷 ${modeLabel} · ${secs}s / ${totalSecs}s · 本批 ${playlist.length} 张`;
}

let _progressTick = null;
let _imageLoadComplete = false; // 标记当前图片是否加载完成
let _loadWaitTime = 0; // 累计等待时间
const MAX_WAIT_TIME = 15000; // 最大等待15秒

function _scheduleNext() {
  if (imgTimer) clearTimeout(imgTimer);
  
  // 检查图片是否已加载完成
  const checkAndSchedule = () => {
    if (_imageLoadComplete || paused) {
      // 图片已加载或已暂停，正常切换
      _loadWaitTime = 0; // 重置等待时间
      log('schedule next in', imgInterval, 'ms');
      imgTimer = setTimeout(() => {
        log('timer fired, calling nextIdx');
        if (!paused) showItem(nextIdx());
      }, imgInterval);
    } else {
      // 图片还在加载，累加等待时间
      _loadWaitTime += 1000;
      
      if (_loadWaitTime >= MAX_WAIT_TIME) {
        // 超过最大等待时间，尝试使用缓存图片
        log('wait timeout, trying cached image');
        const cached = getCachedRandomImage();
        
        if (cached) {
          // 有缓存图片，立即切换到缓存图片
          _loadWaitTime = 0;
          _imageLoadComplete = true; // 强制标记完成
          log('switching to cached image');
          showItemWithCachedImage(cached.img, cached.path);
        } else {
          // 没有缓存，强制标记完成并继续
          _loadWaitTime = 0;
          _imageLoadComplete = true;
          log('no cached image, forcing complete');
          checkAndSchedule(); // 重新检查，会进入上面的分支
        }
      } else {
        // 继续等待
        log(`image still loading, waiting... (${_loadWaitTime/1000}s)`);
        imgTimer = setTimeout(checkAndSchedule, 1000);
      }
    }
  };
  
  checkAndSchedule();
}

function showItem(idx) {
  if (idx < 0 || idx >= playlist.length) { log('bad idx', idx); return; }
  
  // 防止快速切换：如果正在过渡中，忽略新的切换请求
  if (_isTransitioning) {
    log('skip: already transitioning');
    return;
  }
  _isTransitioning = true;
  
  currentIdx = idx;
  const item = playlist[idx];
  log('showItem', idx, item.type, item.name);

  // 清除所有旧计时器
  if (_clipEndHandler) { clearTimeout(_clipEndHandler); _clipEndHandler = null; }
  if (_clipInterval) { clearInterval(_clipInterval); _clipInterval = null; }
  if (_progressTick) { clearInterval(_progressTick); _progressTick = null; }
  if (imgTimer) { clearTimeout(imgTimer); imgTimer = null; }
  if (_autoStartTimer) { clearTimeout(_autoStartTimer); _autoStartTimer = null; }
  
  // 重置图片加载标志
  _imageLoadComplete = false;
  
  // 清理旧的预加载图片
  if (_preloadImg) {
    _preloadImg.onload = null;
    _preloadImg.onerror = null;
    _preloadImg = null;
  }

  // 淡入黑场
  fadeLayer.style.opacity = '1';

  setTimeout(() => {
    if (currentEl) { currentEl.remove(); currentEl = null; }
    // 立即设置下一个计时器（不依赖图片加载）
    if (!paused) _scheduleNext();

    if (item.type === 'image') {
      const animName = KENBURNS_ANIMS[Math.floor(Math.random() * KENBURNS_ANIMS.length)];
      const durationSec = Math.max(imgInterval / 1000, 3);

      // 使用预加载的图片（如果已加载完成）
      let img;
      let imageLoaded = false;
      let fadeOutStarted = false;
      
      if (_preloadImg && _preloadImg.complete && _preloadImg.naturalWidth > 0) {
        // 预加载已完成，直接使用
        log('using preloaded image');
        img = _preloadImg;
        imageLoaded = true;
        _preloadImg = null;
      } else {
        // 预加载未完成或不存在，创建新图片
        log('creating new image element');
        img = document.createElement('img');
        
        // 先显示低质量占位图（如果有）
        const lowQualityImg = _lowQualityCache.get(item.path);
        if (lowQualityImg) {
          log('showing low quality placeholder');
          img.src = lowQualityImg.src;
          img.style.filter = 'blur(10px)';
          img.style.transform = 'scale(1.1)';
          img.style.opacity = '1';
          fadeOutStarted = true;
          setTimeout(() => {
            fadeLayer.style.opacity = '0';
          }, 100);
        }
        
        // 使用带重试的加载机制
        loadImageWithRetry(img, item.path)
          .then(() => {
            log('image loaded:', item.path);
            imageLoaded = true;
            _imageLoadComplete = true;
            
            // 移除模糊效果，平滑过渡到高清图
            img.style.filter = 'none';
            img.style.transform = 'scale(1)';
            img.style.transition = 'filter 0.3s ease-out, transform 0.3s ease-out';
            
            // 如果还没开始淡出，现在开始
            if (!fadeOutStarted) {
              fadeOutStarted = true;
              fadeLayer.style.opacity = '0';
            }
            
            // 释放锁
            setTimeout(() => {
              _isTransitioning = false;
            }, 300);
          })
          .catch(() => {
            log('image load failed after retries');
            _imageLoadComplete = true;
            if (!fadeOutStarted) {
              fadeOutStarted = true;
              fadeLayer.style.opacity = '0';
            }
            _isTransitioning = false;
            setTimeout(() => {
              if (!paused) showItem(nextIdx());
            }, 300);
          });
      }
      
      img.alt = item.name;
      img.className = 'kenburns';
      img.style.opacity = imageLoaded ? '0' : '0';
      img.style.animation = `${animName} ${durationSec}s ease-out forwards`;

      // 立即开始淡出黑场（不等待图片加载）
      setTimeout(() => {
        if (!fadeOutStarted) {
          fadeOutStarted = true;
          fadeLayer.style.opacity = '0';
        }
      }, 100);
      
      // 如果使用的是预加载的图片，立即显示
      if (imageLoaded) {
        _imageLoadComplete = true; // 标记加载完成
        img.style.opacity = '1';
        img.style.transition = 'opacity 0.4s';
        setTimeout(() => {
          fadeLayer.style.opacity = '0';
          setTimeout(() => {
            _isTransitioning = false;
          }, 300);
        }, 100);
      }
      
      img.onerror = () => {
        log('image error:', item.path);
        _imageLoadComplete = true; // 错误也算“完成”，避免无限等待
        // 图片加载失败，确保黑场已淡出并跳到下一张
        if (!fadeOutStarted) {
          fadeOutStarted = true;
          fadeLayer.style.opacity = '0';
        }
        // 释放锁
        _isTransitioning = false;
        setTimeout(() => {
          if (!paused) showItem(nextIdx());
        }, 300);
      };

      player.insertBefore(img, fadeLayer);
      currentEl = img;

      _currentDuration = imgInterval;
      _currentStartTime = Date.now();
      resetTimerBar(imgInterval);
      _progressTick = setInterval(updatePhotoProgress, 500);

      info.textContent = `${item.name}  (${idx+1}/${playlist.length})`;
      
      // 立即预加载下一张图片
      if (!paused) {
        setTimeout(() => preloadNextImage(), 500);
      }
      
      // 超时保护：如果15秒还没加载完成，强制标记为完成并切换
      setTimeout(() => {
        if (!_imageLoadComplete && currentEl === img) {
          log('image load timeout (15s), forcing complete');
          _imageLoadComplete = true; // 强制标记为完成，允许切换
          img.style.opacity = '1';
          if (!fadeOutStarted) {
            fadeOutStarted = true;
            fadeLayer.style.opacity = '0';
          }
          // 释放锁
          setTimeout(() => {
            _isTransitioning = false;
          }, 300);
        }
      }, 15000);
    } else {
      // 视频播放
      resetTimerBar(0);
      const vid = document.createElement('video');
      vid.src = item.path;
      vid.autoplay = true;
      vid.playsInline = true;
      vid.muted = muted;
      vid.style.opacity = '0';

      vid.oncanplay = () => {
        vid.style.transition = 'opacity 0.4s';
        vid.style.opacity = '1';
        const duration = vid.duration;
        const MIN_CLIP = 10;
        if (duration > MIN_CLIP) {
          const maxStart = Math.max(0, duration - VIDEO_CLIP_DURATION);
          const randomStart = Math.random() * maxStart;
          vid.currentTime = randomStart;
          const clipEnd = randomStart + VIDEO_CLIP_DURATION;

          _clipInterval = setInterval(() => {
            const elapsed = vid.currentTime - randomStart;
            if (elapsed > 0 && elapsed <= VIDEO_CLIP_DURATION) {
              progress.textContent = `🎬 视频片段 ${Math.floor(elapsed)}s / ${VIDEO_CLIP_DURATION}s`;
            }
          }, 500);

          currentEl = vid;
          vid.dataset.clipEnd = clipEnd;

          _clipEndHandler = setTimeout(() => {
            if (!paused) showItem(nextIdx());
          }, VIDEO_CLIP_DURATION * 1000);
        } else {
          vid.ontimeupdate = () => {
            if (!paused && vid.duration) {
              const elapsed = vid.currentTime;
              progress.textContent = `🎬 ${Math.floor(elapsed)}s / ${Math.floor(vid.duration)}s`;
            }
          };
        }
      };

      vid.onended = () => {
        clearTimeout(_clipEndHandler); _clipEndHandler = null;
        clearInterval(_clipInterval); _clipInterval = null;
        if (!paused) showItem(nextIdx());
      };
      vid.onerror = () => {
        clearTimeout(_clipEndHandler); _clipEndHandler = null;
        clearInterval(_clipInterval); _clipInterval = null;
        if (!paused) showItem(nextIdx());
      };

      player.insertBefore(vid, fadeLayer);
      currentEl = vid;
      info.textContent = `${item.name}  (${idx+1}/${playlist.length})`;
    }

    fadeLayer.style.opacity = '0';
    
    // 过渡完成，释放锁（等待淡出动画完成）
    setTimeout(() => {
      _isTransitioning = false;
    }, 300);
  }, 300);
}

function nextIdx() {
  if (shuffled) return Math.floor(Math.random() * playlist.length);
  if (currentIdx + 1 >= playlist.length) return 0;
  return currentIdx + 1;
}
function prevIdx() {
  if (shuffled) return Math.floor(Math.random() * playlist.length);
  if (currentIdx - 1 < 0) return playlist.length - 1;
  return currentIdx - 1;
}

document.getElementById('btnPrev').onclick = () => { clearTimeout(imgTimer); showItem(prevIdx()); };
document.getElementById('btnNext').onclick = () => { clearTimeout(imgTimer); showItem(nextIdx()); };
document.getElementById('btnPause').onclick = function() {
  paused = !paused;
  this.textContent = paused ? '▶' : '⏸';
  log('paused =', paused);
  if (!paused) {
    const item = playlist[currentIdx];
    if (item && item.type === 'image') {
      const elapsed = Date.now() - _currentStartTime;
      const remaining = Math.max(500, _currentDuration - elapsed);
      log('resume photo, remaining=', remaining, 'ms');
      _currentStartTime = Date.now() - (_currentDuration - remaining);
      resetTimerBar(remaining);
      _scheduleNext();
      _progressTick = setInterval(updatePhotoProgress, 500);
    } else if (currentEl && currentEl.tagName === 'VIDEO') {
      currentEl.play();
      if (item && currentEl.duration > VIDEO_CLIP_DURATION) {
        const clipEnd = parseFloat(currentEl.dataset.clipEnd) || (currentEl.currentTime + VIDEO_CLIP_DURATION);
        const remaining = clipEnd - currentEl.currentTime;
        _clipEndHandler = setTimeout(() => { if (!paused) showItem(nextIdx()); }, remaining * 1000);
      }
    }
  } else {
    clearTimeout(imgTimer); imgTimer = null;
    clearTimeout(_clipEndHandler); _clipEndHandler = null;
    clearInterval(_clipInterval); _clipInterval = null;
    clearInterval(_progressTick); _progressTick = null;
    timerFill.style.transition = 'none';
    const computed = getComputedStyle(timerFill).width;
    timerFill.style.width = computed;
    if (currentEl && currentEl.tagName === 'VIDEO') currentEl.pause();
  }
};

btnMode.onclick = () => {
  const modes = ['all','photo','video'];
  const labels = ['🎬 全部','📷 照片','🎥 视频'];
  let i = modes.indexOf(mode);
  i = (i+1) % modes.length;
  mode = modes[i];
  btnMode.textContent = labels[i];
  buildPlaylist();
};
btnSpeed.onclick = () => {
  const speeds = [3000,5000,8000,12000];
  const labels = ['3秒','5秒','8秒','12秒'];
  let i = speeds.indexOf(imgInterval);
  i = (i+1) % speeds.length;
  imgInterval = speeds[i];
  btnSpeed.textContent = labels[i];
};
btnShuffle.onclick = () => {
  shuffled = !shuffled;
  btnShuffle.textContent = shuffled ? '🔀 随机' : '🔀 顺序';
};
btnRefresh.onclick = () => { buildPlaylist(); };
document.getElementById('btnMute').onclick = function() {
  muted = !muted;
  this.textContent = muted ? '🔇' : '🔊';
  if (currentEl && currentEl.tagName === 'VIDEO') {
    currentEl.muted = muted;
  }
};
document.getElementById('btnHide').onclick = () => {
  controlsVisible = !controlsVisible;
  document.getElementById('controls').classList.toggle('hidden', !controlsVisible);
  document.getElementById('progress').classList.toggle('hidden', !controlsVisible);
  document.getElementById('overlay').classList.toggle('hidden', !controlsVisible);
  document.getElementById('timerBar').classList.toggle('hidden', !controlsVisible);
};

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { clearTimeout(imgTimer); showItem(nextIdx()); e.preventDefault(); }
  else if (e.key === 'ArrowLeft') { clearTimeout(imgTimer); showItem(prevIdx()); }
  else if (e.key === 'p' || e.key === 'P') document.getElementById('btnPause').click();
  else if (e.key === 'h' || e.key === 'H') document.getElementById('btnHide').click();
  else if (e.key === 'r' || e.key === 'R') btnRefresh.click();
});

// 页面可见性处理：切到其他标签时暂停，切回来继续
document.addEventListener('visibilitychange', () => {
  if (document.hidden && !paused) {
    // 临时暂停
    clearTimeout(imgTimer);
    clearTimeout(_clipEndHandler);
    clearInterval(_progressTick);
    if (currentEl && currentEl.tagName === 'VIDEO') currentEl.pause();
  } else if (!document.hidden && !paused) {
    // 继续播放
    const item = playlist[currentIdx];
    if (item && item.type === 'image') {
      _currentStartTime = Date.now() - 0;
      resetTimerBar(imgInterval);
      imgTimer = setTimeout(() => showItem(nextIdx()), imgInterval);
      _progressTick = setInterval(updatePhotoProgress, 500);
    } else if (currentEl && currentEl.tagName === 'VIDEO') {
      currentEl.play().catch(() => {});
    }
  }
});

async function loadManifest() {
  try {
    log('fetching manifest.json...');
    const resp = await fetch('manifest.json');
    const data = await resp.json();
    allMedia = data;
    log('loaded', allMedia.length, 'items');
    buildPlaylist();
  } catch(e) {
    log('load failed:', e);
    info.textContent = '加载失败: ' + e.message;
  }
}

function buildPlaylist() {
  let items = allMedia || [];
  if (mode === 'photo') items = items.filter(i => i.type === 'image');
  else if (mode === 'video') items = items.filter(i => i.type === 'video');

  if (items.length > BATCH_SIZE) {
    const shuffledItems = [...items];
    for (let i = shuffledItems.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffledItems[i], shuffledItems[j]] = [shuffledItems[j], shuffledItems[i]];
    }
    items = shuffledItems.slice(0, BATCH_SIZE);
  }

  for (let i = items.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [items[i], items[j]] = [items[j], items[i]];
  }

  playlist = items;
  currentIdx = 0;
  log('buildPlaylist: playlist.length =', playlist.length);
  if (playlist.length > 0) showItem(0);
  else { log('no items'); info.textContent = '没有找到媒体文件'; }
}

loadManifest();
</script>
